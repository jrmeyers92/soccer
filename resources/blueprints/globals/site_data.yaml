tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: school_name
            field:
              input_type: text
              antlers: false
              type: text
              display: 'School Name'
              icon: text
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
              width: 50
          -
            handle: mascot
            field:
              input_type: text
              antlers: false
              type: text
              display: Mascot
              icon: text
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
              width: 50
          -
            handle: logo
            field:
              max_files: 1
              mode: list
              container: assets
              restrict: false
              allow_uploads: true
              show_filename: true
              show_set_alt: true
              type: assets
              display: Logo
              icon: assets
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: phone_number
            field:
              type: integer
              display: 'Phone Number'
              icon: integer
              width: 50
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: email
            field:
              input_type: text
              antlers: false
              type: text
              display: Email
              icon: text
              width: 50
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: street_address
            field:
              antlers: false
              type: textarea
              display: 'Street Address'
              icon: textarea
              width: 25
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: school_city
            field:
              input_type: text
              antlers: false
              type: text
              display: 'School City'
              icon: text
              width: 25
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: school_state
            field:
              input_type: text
              antlers: false
              type: text
              display: 'School State'
              icon: text
              width: 25
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: zip_code
            field:
              type: integer
              display: 'Zip Code'
              icon: integer
              width: 25
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: home_page_news_widget_sponser
            field:
              max_items: 1
              mode: default
              create: true
              collections:
                - sponsers
              type: entries
              display: 'Home Page News Widget Sponser'
              icon: entries
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: stripe_link
            field:
              input_type: text
              antlers: false
              type: text
              display: 'Stripe Link'
              icon: text
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: google_analytics_id
            field:
              input_type: text
              antlers: false
              type: text
              display: 'Google Analytics ID'
              instructions: 'e.g. G-XXXXXXXXXX — leave blank to disable tracking'
              icon: text
              width: 50
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: nav_teams
            field:
              type: grid
              display: 'Navigation Teams'
              instructions: 'Teams shown in the site navigation dropdown. Each slug must match the page URL (e.g. boys-jv).'
              fields:
                -
                  handle: slug
                  field:
                    type: text
                    display: 'URL Slug'
                    instructions: 'e.g. boys-jv'
                    width: 50
                -
                  handle: display_name
                  field:
                    type: text
                    display: 'Display Name'
                    instructions: 'e.g. Boys JV'
                    width: 50
  footer:
    display: Footer
    sections:
      -
        display: 'New Section'
        fields:
          -
            handle: footer_logos
            field:
              mode: default
              create: true
              collections:
                - sponsers
              type: entries
              display: 'Footer Logos'
              icon: entries
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: facebook_url
            field:
              input_type: url
              antlers: false
              type: text
              display: 'Facebook URL'
              icon: text
              width: 33
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: twitter_url
            field:
              input_type: url
              antlers: false
              type: text
              display: 'Twitter / X URL'
              icon: text
              width: 34
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: instagram_url
            field:
              input_type: url
              antlers: false
              type: text
              display: 'Instagram URL'
              icon: text
              width: 33
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
