title: Player
fields:
  -
    handle: first_name
    field:
      input_type: text
      antlers: false
      type: text
      display: 'First Name'
      icon: text
      width: 50
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
  -
    handle: last_name
    field:
      input_type: text
      antlers: false
      type: text
      display: 'Last Name'
      icon: text
      width: 50
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
  -
    handle: grade
    field:
      options:
        freshman: Freshman
        sophmore: Sophmore
        junior: Junior
        senior: Senior
      inline: false
      cast_booleans: false
      type: radio
      display: Grade
      icon: radio
      width: 50
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
  -
    handle: position
    field:
      options:
        goalie: Goalie
        defense: Defense
        midfield: Midfield
        forward: Forward
      inline: false
      type: checkboxes
      display: Position
      icon: checkboxes
      width: 50
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
      if:
        $root.sport: soccer
  -
    handle: position_basketball
    field:
      options:
        point_guard: 'Point Guard'
        shooting_guard: 'Shooting Guard'
        small_forward: 'Small Forward'
        power_forward: 'Power Forward'
        center: Center
      inline: false
      type: checkboxes
      display: Position
      icon: checkboxes
      width: 50
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
      if:
        $root.sport: basketball
  -
    handle: position_football
    field:
      options:
        quarterback: Quarterback
        running_back: 'Running Back'
        wide_receiver: 'Wide Receiver'
        tight_end: 'Tight End'
        offensive_line: 'Offensive Line'
        defensive_line: 'Defensive Line'
        linebacker: Linebacker
        cornerback: Cornerback
        safety: Safety
        kicker: Kicker
        punter: Punter
      inline: false
      type: checkboxes
      display: Position
      icon: checkboxes
      width: 50
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
      if:
        $root.sport: football
  -
    handle: position_baseball
    field:
      options:
        pitcher: Pitcher
        catcher: Catcher
        first_base: 'First Base'
        second_base: 'Second Base'
        third_base: 'Third Base'
        shortstop: Shortstop
        left_field: 'Left Field'
        center_field: 'Center Field'
        right_field: 'Right Field'
        designated_hitter: 'Designated Hitter'
      inline: false
      type: checkboxes
      display: Position
      icon: checkboxes
      width: 50
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
      if:
        $root.sport: baseball
  -
    handle: position_track
    field:
      options:
        sprinter: Sprinter
        distance: Distance
        jumper: Jumper
        thrower: Thrower
        hurdler: Hurdler
        relay: Relay
      inline: false
      type: checkboxes
      display: Event / Position
      icon: checkboxes
      width: 50
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
      if:
        $root.sport: track
  -
    handle: captain
    field:
      options:
        captain: Captain
      inline: false
      type: checkboxes
      display: Captain
      icon: checkboxes
      width: 50
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
      instructions: 'Check the checkbox if this player is a captain.'
